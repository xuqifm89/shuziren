services:
  backend:
    image: ${DOCKER_REGISTRY:-shuziren}/shuziren-backend:latest
    container_name: shuziren-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_DIALECT=${DB_DIALECT:-postgres}
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-digital_human}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - DB_SSL=${DB_SSL:-false}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://your-domain.com,https://admin.your-domain.com,https://m.your-domain.com}
      - WX_APPID=${WX_APPID:-}
      - WX_APPSECRET=${WX_APPSECRET:-}
    volumes:
      - backend-assets:/app/assets
      - backend-output:/app/output
      - backend-uploads:/app/uploads
      - backend-data:/app/data
      - backend-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shuziren-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: shuziren-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-digital_human}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - shuziren-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend-pc:
    image: ${DOCKER_REGISTRY:-shuziren}/shuziren-frontend-pc:latest
    container_name: shuziren-frontend-pc
    restart: always
    depends_on:
      - backend
    networks:
      - shuziren-network

  admin-panel:
    image: ${DOCKER_REGISTRY:-shuziren}/shuziren-admin-panel:latest
    container_name: shuziren-admin-panel
    restart: always
    depends_on:
      - backend
    networks:
      - shuziren-network

  frontend-h5:
    image: ${DOCKER_REGISTRY:-shuziren}/shuziren-frontend-h5:latest
    container_name: shuziren-frontend-h5
    restart: always
    depends_on:
      - backend
    networks:
      - shuziren-network

  nginx:
    image: nginx:alpine
    container_name: shuziren-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend
      - frontend-pc
      - admin-panel
      - frontend-h5
    networks:
      - shuziren-network

volumes:
  postgres-data:
  backend-assets:
  backend-output:
  backend-uploads:
  backend-data:
  backend-logs:
  nginx-logs:

networks:
  shuziren-network:
    driver: bridge
