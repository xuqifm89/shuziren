upstream docker_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

upstream docker_frontend_pc {
    server 127.0.0.1:3080;
    keepalive 32;
}

upstream docker_admin_panel {
    server 127.0.0.1:3081;
    keepalive 32;
}

upstream docker_frontend_h5 {
    server 127.0.0.1:3082;
    keepalive 32;
}

server {
    listen 80;
    server_name dsface.com www.dsface.com;

    client_max_body_size 200m;

    location /api/ {
        proxy_pass http://docker_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /ws {
        proxy_pass http://docker_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        proxy_pass http://docker_frontend_pc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

