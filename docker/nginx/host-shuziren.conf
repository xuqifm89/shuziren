server {
    listen 80;
    server_name dsface.com www.dsface.com;

    if ($host = www.dsface.com) {
        return 301 https://$host$request_uri;
    }

    if ($host = dsface.com) {
        return 301 https://$host$request_uri;
    }

    return 404;
}

