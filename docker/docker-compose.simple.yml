version: '3.8'

services:
  backend:
    build:
      context: ../packages/backend
      dockerfile: Dockerfile
    container_name: shuziren-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      
      - DB_DIALECT=sqlite
      - DB_PATH=/app/data/database.sqlite
      
      - STORAGE_MODE=local
      - LOCAL_MEDIA_PATH=/app/assets
      
      - JWT_SECRET=${JWT_SECRET:-shuziren_jwt_secret_2024}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:-shuziren_admin_jwt_secret_2024}
      
      - CORS_ORIGINS=${CORS_ORIGINS:-http://43.155.188.118,http://43.155.188.118:3081,http://43.155.188.118:3082}
      
      - LOG_LEVEL=info
      - CONFIG_ENCRYPTION_KEY=shuziren_config_encryption_key_2024
    
    volumes:
      - shuziren-assets:/app/assets
      - shuziren-output:/app/output
      - shuziren-data:/app/data
      - shuziren-cookies:/app/social-auto-upload/cookies
    
    restart: unless-stopped
    
    networks:
      - shuziren-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend-pc:
    build:
      context: ..
      dockerfile: packages/frontend-pc/Dockerfile
    container_name: shuziren-frontend-pc
    ports:
      - "3080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shuziren-network

  admin-panel:
    build:
      context: ..
      dockerfile: packages/admin-panel/Dockerfile
    container_name: shuziren-admin-panel
    ports:
      - "3081:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shuziren-network

  frontend-h5:
    build:
      context: ..
      dockerfile: packages/frontend-miniapp/Dockerfile
    container_name: shuziren-frontend-h5
    ports:
      - "3082:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shuziren-network

networks:
  shuziren-network:
    driver: bridge

volumes:
  shuziren-assets:
    name: shuziren_assets
  
  shuziren-output:
    name: shuziren_output
  
  shuziren-data:
    name: shuziren_data

  shuziren-cookies:
    name: shuziren_cookies
