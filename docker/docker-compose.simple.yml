services:
  backend:
    build:
      context: ../packages/backend
      dockerfile: Dockerfile
    container_name: shuziren-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - DB_DIALECT=sqlite
      - DB_PATH=/app/data/database.sqlite
      - STORAGE_MODE=local
      - LOCAL_MEDIA_PATH=/app/assets
      - JWT_SECRET=${JWT_SECRET:-shuziren_jwt_secret_2024}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:-shuziren_admin_jwt_secret_2024}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://43.155.188.118:3001,http://43.155.188.118}
      - LOG_LEVEL=info
      - CONFIG_ENCRYPTION_KEY=shuziren_config_encryption_key_2024
      - FRONTEND_DIR=/app/frontend
    volumes:
      - ../packages/backend:/app
      - /app/node_modules
      - ../packages/backend/social-auto-upload:/app/social-auto-upload
      - shuziren-assets:/app/assets
      - shuziren-output:/app/output
      - shuziren-data:/app/data
      - shuziren-cookies:/app/social-auto-upload/cookies
      - ../packages/frontend-pc/dist:/app/frontend/pc
      - ../packages/frontend-miniapp/dist/build/h5:/app/frontend/h5
      - ../packages/admin-panel/dist:/app/frontend/admin
    restart: unless-stopped
    networks:
      - shuziren-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  shuziren-network:
    driver: bridge

volumes:
  shuziren-assets:
    name: shuziren_assets
  shuziren-output:
    name: shuziren_output
  shuziren-data:
    name: shuziren_data
  shuziren-cookies:
    name: shuziren_cookies
