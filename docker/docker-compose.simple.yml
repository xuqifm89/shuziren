services:
  backend:
    build:
      context: ../packages/backend
      dockerfile: Dockerfile
    container_name: shuziren-backend
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - DB_DIALECT=sqlite
      - DB_PATH=/app/data/database.sqlite
      - STORAGE_MODE=local
      - LOCAL_MEDIA_PATH=/app/assets
      - JWT_SECRET=${JWT_SECRET:-shuziren_jwt_secret_2024}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:-shuziren_admin_jwt_secret_2024}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOG_LEVEL=info
      - CONFIG_ENCRYPTION_KEY=${CONFIG_ENCRYPTION_KEY:-shuziren_config_encryption_key_2024}
    volumes:
      - shuziren-assets:/app/assets
      - shuziren-output:/app/output
      - shuziren-data:/app/data
      - shuziren-cookies:/app/social-auto-upload/cookies
    restart: unless-stopped
    networks:
      - shuziren-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend-pc:
    build:
      context: ..
      dockerfile: packages/frontend-pc/Dockerfile
    container_name: shuziren-frontend-pc
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shuziren-network

  admin-panel:
    build:
      context: ..
      dockerfile: packages/admin-panel/Dockerfile
    container_name: shuziren-admin-panel
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shuziren-network

  frontend-h5:
    build:
      context: ..
      dockerfile: packages/frontend-miniapp/Dockerfile
    container_name: shuziren-frontend-h5
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shuziren-network

  nginx:
    image: nginx:alpine
    container_name: shuziren-nginx
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${ADMIN_PORT:-8080}:8080"
      - "${H5_PORT:-8081}:8081"
    volumes:
      - ./nginx/simple.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend-pc
      - admin-panel
      - frontend-h5
    restart: unless-stopped
    networks:
      - shuziren-network

networks:
  shuziren-network:
    driver: bridge

volumes:
  shuziren-assets:
    name: shuziren_assets
  shuziren-output:
    name: shuziren_output
  shuziren-data:
    name: shuziren_data
  shuziren-cookies:
    name: shuziren_cookies
