# ============================================
# 拾光引擎 - 简化版 Docker Compose 配置（使用 SQLite）
# ============================================
# 使用方法:
#   启动服务:   docker compose -f docker-compose.simple.yml up -d
#   查看日志:   docker compose -f docker-compose.simple.yml logs -f backend
#   停止服务:   docker compose -f docker-compose.simple.yml down
# ============================================

version: '3.8'

services:
  # ==========================================
  # 后端 API 服务
  # ==========================================
  backend:
    build:
      context: ../packages/backend
      dockerfile: Dockerfile
    container_name: shuziren-backend
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      
      # 使用 SQLite 数据库（更简单）
      - DB_DIALECT=sqlite
      - DB_PATH=/app/data/database.sqlite
      
      # 存储配置
      - STORAGE_MODE=local
      - LOCAL_MEDIA_PATH=/app/assets
      
      # JWT配置
      - JWT_SECRET=${JWT_SECRET:-shuziren_jwt_secret_2024}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:-shuziren_admin_jwt_secret_2024}
      
      # CORS配置（允许你的服务器IP）
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}
      
      # 日志级别
      - LOG_LEVEL=info
      # 配置加密密钥（生产环境必须设置）
      - CONFIG_ENCRYPTION_KEY=shuziren_config_encryption_key_2024
    
    volumes:
      # 本地文件存储持久化
      - shuziren-assets:/app/assets
      - shuziren-output:/app/output
      - shuziren-data:/app/data
    
    restart: unless-stopped
    
    networks:
      - shuziren-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # 前端 Web 服务（Nginx）
  # ==========================================
  frontend-pc:
    build:
      context: ..
      dockerfile: packages/frontend-pc/Dockerfile
    container_name: shuziren-frontend-pc
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shuziren-network

  admin-panel:
    build:
      context: ..
      dockerfile: packages/admin-panel/Dockerfile
    container_name: shuziren-admin-panel
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shuziren-network

  # ==========================================
  # H5 移动端服务（Nginx）
  # ==========================================
  frontend-h5:
    build:
      context: ..
      dockerfile: packages/frontend-miniapp/Dockerfile
    container_name: shuziren-frontend-h5
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shuziren-network

# ==========================================
# 网络配置
# ==========================================
networks:
  shuziren-network:
    driver: bridge

# ==========================================
# 数据卷（持久化存储）
# ==========================================
volumes:
  shuziren-assets:
    name: shuziren_assets
  
  shuziren-output:
    name: shuziren_output
  
  shuziren-data:
    name: shuziren_data
