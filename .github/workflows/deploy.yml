name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./packages/backend
          file: ./packages/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/shuziren-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/shuziren-backend:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend-pc
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/frontend-pc/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/shuziren-frontend-pc:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/shuziren-frontend-pc:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push admin-panel
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/admin-panel/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/shuziren-admin-panel:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/shuziren-admin-panel:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend-h5
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/frontend-miniapp/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/shuziren-frontend-h5:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/shuziren-frontend-h5:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "### Docker Images Built and Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| backend | \`${{ steps.sha.outputs.short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend-pc | \`${{ steps.sha.outputs.short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| admin-panel | \`${{ steps.sha.outputs.short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend-h5 | \`${{ steps.sha.outputs.short }}\` |" >> $GITHUB_STEP_SUMMARY
