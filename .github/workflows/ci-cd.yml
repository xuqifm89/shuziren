name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run postinstall
        run: node scripts/postinstall.js

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Test Backend
        run: |
          cd packages/backend
          npm test --if-present
        continue-on-error: true

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            echo "========================================="
            echo "  开始部署 - $(date)"
            echo "========================================="

            cd /opt/shuziren

            echo "1. 拉取最新代码..."
            git checkout -- .
            git pull origin main

            echo "2. 检查 Docker 环境..."
            docker --version
            docker compose version

            echo "3. 停止旧容器..."
            docker compose -f docker/docker-compose.simple.yml down 2>/dev/null || true

            echo "4. 重新构建镜像..."
            docker compose -f docker/docker-compose.simple.yml build --no-cache

            echo "5. 启动服务..."
            docker compose -f docker/docker-compose.simple.yml up -d --remove-orphans

            echo "6. 配置宿主机 Nginx..."
            if [ -f /etc/nginx/sites-available/shuziren ]; then
              echo "   Nginx 配置已存在，更新..."
            else
              echo "   首次部署，创建 Nginx 配置..."
            fi
            cp docker/nginx/host-shuziren.conf /etc/nginx/sites-available/shuziren
            ln -sf /etc/nginx/sites-available/shuziren /etc/nginx/sites-enabled/shuziren
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && nginx -s reload

            echo "7. 等待服务就绪..."
            sleep 30

            echo "8. 健康检查..."
            for i in 1 2 3 4 5; do
              HEALTH=$(curl -sf http://localhost:3001/api/health 2>/dev/null | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "failed")
              if [ "$HEALTH" = "ok" ]; then
                echo "   后端服务正常"
                break
              fi
              echo "   等待后端服务启动... (尝试 $i/5)"
              sleep 10
            done

            if [ "$HEALTH" != "ok" ]; then
              echo "   后端服务可能未就绪 (status: $HEALTH)"
              echo "   后端容器日志:"
              docker logs shuziren-backend --tail 50 2>&1 || true
            fi

            echo "9. 清理旧镜像..."
            docker image prune -f

            echo "========================================="
            echo "  部署完成 - $(date)"
            echo "========================================="
