name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run postinstall
        run: node scripts/postinstall.js

      - name: Lint
        run: npm run lint --if-present

      - name: Test Backend
        run: |
          cd packages/backend
          npm test --if-present

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            echo "========================================="
            echo "  开始部署 - $(date)"
            echo "========================================="

            cd /opt/shuziren

            echo "1. 拉取最新代码..."
            git pull origin main

            echo "2. 重新构建镜像..."
            docker compose -f docker/docker-compose.simple.yml build --no-cache

            echo "3. 重启服务..."
            docker compose -f docker/docker-compose.simple.yml up -d --remove-orphans

            echo "4. 等待服务就绪..."
            sleep 10

            echo "5. 健康检查..."
            HEALTH=$(curl -s http://localhost:3001/api/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "failed")
            if [ "$HEALTH" = "ok" ]; then
              echo "   ✅ 后端服务正常"
            else
              echo "   ⚠️  后端服务可能未就绪 (status: $HEALTH)"
            fi

            echo "6. 清理旧镜像..."
            docker image prune -f

            echo "========================================="
            echo "  ✅ 部署完成 - $(date)"
            echo "========================================="
